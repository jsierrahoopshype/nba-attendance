<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Player — NBA Arena Records</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container narrow">
  <a class="back" href="index.html">← All players &amp; arenas</a>
  <div id="head"></div>
  <div class="controls" id="controls" style="display:none">
    <div class="field">
      <span class="lbl">Game type</span>
      <div class="toggle" id="gtToggle">
        <button data-gt="Regular Season" class="active">Regular Season</button>
        <button data-gt="Playoffs">Playoffs</button>
      </div>
    </div>
  </div>
  <div id="result"><div class="loading">Loading…</div></div>
  <div class="foot" id="foot">One row per building where the player logged minutes.</div>
</div>

<script src="app.js"></script>
<script>
"use strict";
let player = null, gt = "Regular Season", season = null;

async function boot() {
  const id = qp("id");
  if (!id) { document.getElementById("result").innerHTML = '<div class="err">No player id given.</div>'; return; }
  try { player = await getJSON(DATA + "/players/" + encodeURIComponent(id) + ".json"); }
  catch (err) { document.getElementById("result").innerHTML = '<div class="err">Could not load player: ' + esc(err.message) + "</div>"; return; }

  document.title = player.name + " — NBA Arena Records";
  const buildings = new Set(player.records.map(r => r.building)).size;
  const fs = Math.min(...player.records.map(r => r.first_season));
  const ls = Math.max(...player.records.map(r => r.last_season));
  document.getElementById("head").innerHTML =
    '<div class="ehead"><h1>' + esc(player.name) + "</h1>" +
    '<div class="esub"><span>' + buildings + " buildings</span><span class=\"sep\">·</span>" +
    "<span>" + seasons(fs, ls) + "</span></div></div>";
  document.getElementById("foot").textContent =
    "Records span the " + seasons(fs, ls) + " seasons · one row per building where the player logged minutes.";
  document.getElementById("controls").style.display = "";
  makeSeasonPicker(document.getElementById("controls"), player.records_by_season, s => { season = s; render(); }, player.draw_seasons);

  document.querySelectorAll("#gtToggle button").forEach(b =>
    b.addEventListener("click", () => {
      document.querySelectorAll("#gtToggle button").forEach(x => x.classList.toggle("active", x === b));
      gt = b.dataset.gt; render();
    }));
  render();
}

function render() {
  const seasonScope = season == null ? "All Seasons" : seasonLabel(season);
  const recs = season == null
    ? player.records.filter(r => r.gameType === gt)
    : (player.records_by_season || [])
        .filter(r => r.gameType === gt && r.season === season)
        .map(r => ({ ...r, first_season: r.season, last_season: r.season }));
  const mount = document.getElementById("result");
  mount.innerHTML = "";
  const h = document.createElement("div");
  h.className = "section-title";
  h.innerHTML = "Record at every building <span style='color:var(--text-secondary);font-weight:400;font-size:.8rem'>— " + esc(gt) + " · " + esc(seasonScope) + "</span>";
  mount.appendChild(h);
  if (!recs.length) { mount.insertAdjacentHTML("beforeend", '<div class="empty">No ' + esc(gt) + " games on record for " + esc(seasonScope) + ".</div>"); renderArenaDraw(mount); return; }

  const tableMount = document.createElement("div");
  mount.appendChild(tableMount);
  const rows = recs.map(r => ({ ...r, _href: arenaHref(r.slug) }));
  const cols = [
    { key: "building", label: "Building", align: "left", defaultDir: "asc", get: r => r.building,
      cell: r => arenaLink(r.slug, r.building) + '<span class="pill">' + esc(r.buildingType) + "</span>" },
    { key: "city", label: "City", align: "left", defaultDir: "asc", get: r => r.city,
      cell: r => r.city_slug ? cityLink(r.city_slug, r.city) : '<span class="sub">' + esc(r.city) + "</span>" },
    { key: "games", label: "GP", defaultDir: "desc", get: r => r.games, cell: r => fmtInt(r.games) },
    { key: "wins", label: "W", defaultDir: "desc", get: r => r.wins, cell: r => fmtInt(r.wins) },
    { key: "losses", label: "L", defaultDir: "desc", get: r => r.losses, cell: r => fmtInt(r.losses) },
    { key: "win_pct", label: "Win%", defaultDir: "desc", get: r => r.win_pct, cell: r => pct(r.win_pct) },
    { key: "total_points", label: "Pts", defaultDir: "desc", get: r => r.total_points, cell: r => fmtInt(r.total_points) },
    { key: "ppg", label: "PPG", defaultDir: "desc", get: r => r.ppg, cell: r => fmt1(r.ppg) },
    { key: "career_high", label: "Hi", defaultDir: "desc", get: r => r.career_high, cell: r => fmtInt(r.career_high) },
    { key: "seasons", label: "Seasons", align: "left", defaultDir: "asc", get: r => r.first_season, cell: r => '<span class="sub">' + seasons(r.first_season, r.last_season) + "</span>" },
  ];
  sortableTable(tableMount, cols, rows, { key: "games", dir: "desc" });
  wireRowNav(tableMount);

  renderArenaDraw(mount);
}

/* This player's road-attendance draw at each arena. Follows the season selector:
   season-keyed data (2007-2026) preferred, single-season fallback. */
function renderArenaDraw(mount) {
  const bySeason = player.arena_draw_by_season;
  const hasAny = bySeason
    ? ((player.draw_seasons || []).length > 0 || (bySeason.all || []).length > 0)
    : (player.arena_draw || []).length > 0;
  if (!hasAny) return;
  let draw, absent;
  if (bySeason) {
    absent = seasonAbsentFromDraw(player.draw_seasons, season);
    draw = absent ? [] : (bySeason[drawKey(season)] || []);
  } else {
    absent = !(season == null || season === 2026);
    draw = player.arena_draw || [];
  }
  const scopeLabel = season == null
    ? "all seasons · " + esc(player.draw_label || "")
    : esc(seasonLabel(season));
  mount.insertAdjacentHTML("beforeend",
    "<div class='section-title'>Attendance draw by arena " +
    "<span style='color:var(--text-secondary);font-weight:400;font-size:.8rem'>— " + scopeLabel + "</span></div>");
  mount.insertAdjacentHTML("beforeend", drawExplainerHTML());

  if (absent) {
    mount.insertAdjacentHTML("beforeend",
      '<div class="draw-note">No attendance data exists for the <strong>' + esc(seasonLabel(season)) +
      "</strong> season, so there's no draw to show. Attendance is available for " +
      esc(player.draw_label || "2026") + " — pick a covered season or <strong>All Seasons</strong>.</div>");
    return;
  }
  if (!draw.length) return;

  const dm = document.createElement("div");
  mount.appendChild(dm);
  const rows = draw.map(r => ({ ...r, _href: arenaHref(r.slug) }));
  const cols = [
    { key: "arena", label: "Arena", align: "left", defaultDir: "asc", get: r => r.arena, cell: r => arenaLink(r.slug, r.arena) },
    { key: "city", label: "City", align: "left", defaultDir: "asc", get: r => r.city || "",
      cell: r => r.city_slug ? cityLink(r.city_slug, r.city) : '<span class="sub">' + esc(r.city || "") + "</span>" },
    { key: "games", label: "Road Games", defaultDir: "desc", get: r => r.games, cell: r => fmtInt(r.games) },
    ...drawDeltaCols(),
  ];
  sortableTable(dm, cols, rows, { key: "total_delta", dir: "desc" });
  wireRowNav(dm);

  // Fix 6 — same draw aggregated to cities (games-weighted), cities linked.
  renderCityDraw(mount, draw);
}

/* Aggregate this player's arena draw rows up to cities, games-weighted. */
function renderCityDraw(mount, draw) {
  const byCity = new Map();
  for (const r of draw) {
    const key = r.city_slug || r.city || "";
    if (!key) continue;
    const a = byCity.get(key) || { city: r.city, city_slug: r.city_slug, wsum: 0, games: 0 };
    a.wsum += r.mean_delta * r.games;
    a.games += r.games;
    byCity.set(key, a);
  }
  const rows = [...byCity.values()]
    .filter(a => a.games > 0)
    .map(a => ({ city: a.city, city_slug: a.city_slug, games: a.games,
                 mean_delta: Math.round((a.wsum / a.games) * 10) / 10 }));
  if (!rows.length) return;
  mount.insertAdjacentHTML("beforeend",
    "<div class='section-title'>Attendance draw by city " +
    "<span style='color:var(--text-secondary);font-weight:400;font-size:.8rem'>— arenas combined per city</span></div>");
  mount.insertAdjacentHTML("beforeend", drawExplainerHTML());
  const cm = document.createElement("div");
  mount.appendChild(cm);
  const r2 = rows.map(r => ({ ...r, _href: r.city_slug ? cityHref(r.city_slug) : null }));
  sortableTable(cm, [
    { key: "city", label: "City", align: "left", defaultDir: "asc", get: r => r.city || "",
      cell: r => r.city_slug ? cityLink(r.city_slug, r.city) : '<span class="sub">' + esc(r.city || "") + "</span>" },
    { key: "games", label: "Road Games", defaultDir: "desc", get: r => r.games, cell: r => fmtInt(r.games) },
    ...drawDeltaCols(),
  ], r2, { key: "total_delta", dir: "desc" });
  wireRowNav(cm);
}

boot();
</script>
</body>
</html>
