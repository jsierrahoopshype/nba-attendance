<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Arena — NBA Arena Records</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🏀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="container">
  <a class="back" href="index.html">← All players &amp; arenas</a>
  <div id="head"></div>
  <div id="cards"></div>
  <div class="controls" id="controls" style="display:none">
    <div class="field">
      <span class="lbl">Game type</span>
      <div class="toggle" id="gtToggle">
        <button data-gt="regular" class="active">Regular Season</button>
        <button data-gt="playoffs">Playoffs</button>
      </div>
    </div>
  </div>
  <div id="result"><div class="loading">Loading…</div></div>
  <div class="foot">Leaderboards cover the 2007–2026 seasons · minimum 15 games for the win% board.</div>
</div>

<script src="app.js"></script>
<script>
"use strict";
let building = null, over = null, gt = "regular", season = null;

/* home/away split (merged into the leaderboard); home_games === 0 => shaded row */
const homeAwayOf = pid => (building.home_away || {})[pid] || null;
const noHomeClass = r => {
  const ha = homeAwayOf(r.personId);
  return (ha && ha.home_games === 0 && ha.away_games > 0) ? "no-home" : "";
};
/* draw tables only show real attendance for 2026; note when another season is picked */
const drawSeasonOK = () => season == null || season === 2026;

async function boot() {
  const slug = qp("slug");
  if (!slug) { document.getElementById("result").innerHTML = '<div class="err">No arena given.</div>'; return; }
  try {
    [building, over] = await Promise.all([
      getJSON(DATA + "/buildings/" + encodeURIComponent(slug) + ".json"),
      getJSON(DATA + "/buildings/overview.json").catch(() => []),
    ]);
  } catch (err) {
    document.getElementById("result").innerHTML = '<div class="err">Could not load arena: ' + esc(err.message) + "</div>"; return;
  }

  document.title = building.name + " — NBA Arena Records";
  const cityCell = building.city_slug
    ? cityLink(building.city_slug, building.city) : esc(building.city);
  document.getElementById("head").innerHTML =
    '<div class="ehead"><h1>' + esc(building.name) + "</h1>" +
    '<div class="esub"><span class="pill" style="margin-left:0">' + esc(building.buildingType) + "</span>" +
    "<span>" + cityCell + '</span><span class="sep">·</span>' +
    "<span>" + seasons(building.first_season, building.last_season) + '</span><span class="sep">·</span>' +
    "<span>" + fmtInt(building.total_games) + " games hosted</span><span class=\"sep\">·</span>" +
    "<span>" + fmtInt(building.player_game_rows) + " player-game records</span></div></div>";

  await loadAllstar();
  renderCards();
  document.getElementById("controls").style.display = "";
  makeSeasonPicker(document.getElementById("controls"), building.records_by_season, s => { season = s; render(); });
  makeAllstarToggle(document.getElementById("controls"), render);
  document.querySelectorAll("#gtToggle button").forEach(b =>
    b.addEventListener("click", () => {
      document.querySelectorAll("#gtToggle button").forEach(x => x.classList.toggle("active", x === b));
      gt = b.dataset.gt; render();
    }));
  render();
}

/* Leaderboards + full-records rows for the current gameType, honoring the season
   filter. season === null keeps the untouched all-time path (precomputed
   leaderboards + all-time records). */
function currentView(gtLabel) {
  if (season == null) {
    const lbSet = (allstarMode && building.leaderboards_allstar)
      ? building.leaderboards_allstar : building.leaderboards;
    const recs = filterAllstar(building.records.filter(r => r.gameType === gtLabel), r => r.personId);
    return { lbs: lbSet[gt], recs };
  }
  let srecs = (building.records_by_season || [])
    .filter(r => r.gameType === gtLabel && r.season === season);
  srecs = filterAllstar(srecs, r => r.personId);
  const recs = srecs.map(r => ({ ...r, first_season: r.season, last_season: r.season }));
  return { lbs: computeLeaderboards(srecs), recs };
}

function renderCards() {
  const o = (over || []).find(x => x.slug === building.slug);
  const card = (lbl, num, sub) =>
    '<div class="stat-card"><div class="lbl">' + lbl + '</div><div class="num">' + num + "</div>" +
    (sub ? '<div class="sub">' + sub + "</div>" : "") + "</div>";
  let html = "";
  if (o) {
    html += card("Top Scorer",
      o.top_scorer ? playerLink(o.top_scorer.personId, o.top_scorer.name) : "—",
      o.top_scorer ? fmtInt(o.top_scorer.points) + " total points" : "");
    html += card("Winningest Player",
      o.winningest_player ? playerLink(o.winningest_player.personId, o.winningest_player.name) : "—",
      o.winningest_player ? pct(o.winningest_player.win_pct) + " · " + o.winningest_player.games + " g (min 15)" : "");
    html += card("Winningest Team",
      o.winningest_team ? esc(o.winningest_team.team) : "—",
      o.winningest_team ? pct(o.winningest_team.win_pct) + " · " + o.winningest_team.games + " g (min 20)" : "");
    html += card("Avg Attendance",
      o.avg_attendance == null ? "—" : fmtInt(o.avg_attendance),
      esc(o.avg_attendance_label));
  }
  document.getElementById("cards").innerHTML = html ? '<div class="stat-cards">' + html + "</div>" : "";
}

const LB_DEFS = [
  { key: "total_points", title: "Most Points", cap: "total points here", col: "Pts", val: r => fmtInt(r.total_points), sort: r => r.total_points },
  { key: "wins", title: "Most Wins", cap: "games won", col: "W", val: r => fmtInt(r.wins), sort: r => r.wins },
  { key: "win_pct", title: "Best Win %", cap: "min 15 games", col: "Win%", val: r => pct(r.win_pct), sort: r => r.win_pct },
  { key: "career_high", title: "Highest Single Game", cap: "career high here", col: "Hi", val: r => fmtInt(r.career_high), sort: r => r.career_high },
];

function render() {
  const gtLabel = gt === "regular" ? "Regular Season" : "Playoffs";
  const { lbs, recs: fullRecs } = currentView(gtLabel);
  const scope = allstarMode ? "All-Stars" : "all players";
  const seasonScope = season == null ? "All Seasons" : seasonLabel(season);
  const mount = document.getElementById("result");
  mount.innerHTML = "<div class='section-title'>" + esc(building.name) +
    " leaders <span style='color:var(--text-secondary);font-weight:400;font-size:.8rem'>— " +
    gtLabel + " · " + seasonScope + " · " + scope + "</span></div>";

  const grid = document.createElement("div");
  grid.className = "lb-grid";
  mount.appendChild(grid);
  let any = false;
  LB_DEFS.forEach(def => {
    const rows = (lbs[def.key] || []).map(r => ({ ...r, _href: playerHref(r.personId) }));
    if (rows.length) any = true;
    const card = document.createElement("div");
    card.className = "block lb-card";
    card.innerHTML = "<h3>" + def.title + ' <span class="cap">(' + def.cap + ")</span></h3>";
    const tm = document.createElement("div");
    card.appendChild(tm);
    grid.appendChild(card);
    const cols = [
      { key: "rank", label: "#", sortable: false, cell: (r, i) => "" },
      { key: "playerName", label: "Player", align: "left", defaultDir: "asc", get: r => r.playerName, cell: r => playerLink(r.personId, r.playerName) },
      { key: "games", label: "GP", defaultDir: "desc", get: r => r.games, cell: r => fmtInt(r.games) },
      { key: def.key, label: def.col, defaultDir: "desc", get: def.sort, cell: def.val },
    ];
    // drop the placeholder rank col (kept simple: index handled by sort order)
    sortableTable(tm, cols.slice(1), rows, { key: def.key, dir: "desc" }, { rowClass: noHomeClass });
    wireRowNav(tm);
  });
  if (!any) mount.insertAdjacentHTML("beforeend", '<div class="empty">No ' + gtLabel +
    (allstarMode ? " All-Star" : "") + " records at this building.</div>");

  // visiting-player + visiting-team attendance draw (2026 only) — its own
  // All-Stars-only default, and a note off-2026 instead of stale numbers.
  renderDrawTables(mount);

  // full records table for this game type (season-aware). The home/away split is
  // merged in — home + road game counts per player, and rows for players who
  // never played here for the home team (home games === 0) are shaded.
  const recs = fullRecs;
  if (recs.length) {
    mount.insertAdjacentHTML("beforeend", "<div class='section-title'>All " + gtLabel + " records " +
      "<span style='color:var(--text-secondary);font-weight:400;font-size:.8rem'>(" + recs.length + " · " + seasonScope +
      ") · shaded = never played here for the home team</span></div>");
    const am = document.createElement("div");
    mount.appendChild(am);
    const rows = recs.map(r => ({ ...r, _href: playerHref(r.personId) }));
    const homeG = r => { const ha = homeAwayOf(r.personId); return ha ? ha.home_games : null; };
    const awayG = r => { const ha = homeAwayOf(r.personId); return ha ? ha.away_games : null; };
    const cols = [
      { key: "playerName", label: "Player", align: "left", defaultDir: "asc", get: r => r.playerName, cell: r => playerLink(r.personId, r.playerName) },
      { key: "games", label: "GP", defaultDir: "desc", get: r => r.games, cell: r => fmtInt(r.games) },
      { key: "home_games", label: "Home", defaultDir: "desc", get: homeG, cell: r => { const v = homeG(r); return v == null ? '<span class="dash">—</span>' : fmtInt(v); } },
      { key: "away_games", label: "Road", defaultDir: "desc", get: awayG, cell: r => { const v = awayG(r); return v == null ? '<span class="dash">—</span>' : fmtInt(v); } },
      { key: "wins", label: "W", defaultDir: "desc", get: r => r.wins, cell: r => fmtInt(r.wins) },
      { key: "losses", label: "L", defaultDir: "desc", get: r => r.losses, cell: r => fmtInt(r.losses) },
      { key: "win_pct", label: "Win%", defaultDir: "desc", get: r => r.win_pct, cell: r => pct(r.win_pct) },
      { key: "total_points", label: "Pts", defaultDir: "desc", get: r => r.total_points, cell: r => fmtInt(r.total_points) },
      { key: "ppg", label: "PPG", defaultDir: "desc", get: r => r.ppg, cell: r => fmt1(r.ppg) },
      { key: "career_high", label: "Hi", defaultDir: "desc", get: r => r.career_high, cell: r => fmtInt(r.career_high) },
      { key: "seasons", label: "Seasons", align: "left", defaultDir: "asc", get: r => r.first_season, cell: r => '<span class="sub">' + seasons(r.first_season, r.last_season) + "</span>" },
    ];
    sortableTable(am, cols, rows, { key: "total_points", dir: "desc" }, { rowClass: noHomeClass });
    wireRowNav(am);
  }
}

/* Visiting-player draw and visiting-team draw, side by side. These default to
   All-Stars only (drawAllstarMode) — the opposite default from the career
   tables — and are toggleable to show everyone. Attendance only exists for
   2026, so any other season selection shows a note instead of stale numbers. */
function renderDrawTables(mount) {
  const players = (building.visiting_draw || []);
  const teams = (building.team_draw || []);
  if (!players.length && !teams.length) return;
  const label = esc(building.draw_label || "2026 season only");
  mount.insertAdjacentHTML("beforeend",
    "<div class='section-title'>Who drew the most here " +
    "<span style='color:var(--text-secondary);font-weight:400;font-size:.8rem'>— " + label + "</span></div>");

  if (!drawSeasonOK()) {
    mount.insertAdjacentHTML("beforeend",
      '<div class="draw-note">Attendance data only exists for the 2026 season, so the ' +
      "draw tables can't be shown for " + esc(seasonLabel(season)) +
      ". Switch the season back to <strong>All Seasons</strong> or <strong>2025-26</strong> to see them.</div>");
    return;
  }

  const dc = document.createElement("div");
  dc.className = "controls";
  mount.appendChild(dc);
  makeAllstarToggle(dc, render, {
    label: "Draw players", get: () => drawAllstarMode, set: v => { drawAllstarMode = v; },
  });

  const grid = document.createElement("div");
  grid.className = "lb-grid";
  mount.appendChild(grid);

  // players (All-Star filterable)
  const pfil = filterAllstar(players, r => r.personId, drawAllstarMode);
  const pcard = document.createElement("div");
  pcard.className = "block lb-card";
  pcard.innerHTML = '<h3>Visiting players <span class="cap">(avg draw vs baseline)</span></h3>';
  const pm = document.createElement("div");
  pcard.appendChild(pm); grid.appendChild(pcard);
  if (pfil.length) {
    const prows = pfil.map(r => ({ ...r, _href: playerHref(r.personId) }));
    sortableTable(pm, [
      { key: "playerName", label: "Player", align: "left", defaultDir: "asc", get: r => r.playerName, cell: r => playerLink(r.personId, r.playerName) },
      { key: "games", label: "G", defaultDir: "desc", get: r => r.games, cell: r => fmtInt(r.games) },
      { key: "mean_delta", label: "Avg Draw", defaultDir: "desc", get: r => r.mean_delta,
        cell: r => '<span class="delta ' + deltaCls(r.mean_delta) + '">' + signed(r.mean_delta) + "</span>" },
    ], prows, { key: "mean_delta", dir: "desc" });
    wireRowNav(pm);
  } else { pm.innerHTML = '<div class="empty">No visiting-player draw on record.</div>'; }

  // teams have no All-Star attribute, so the toggle governs the player table
  // only; the team draw always shows every visiting team.
  const tcard = document.createElement("div");
  tcard.className = "block lb-card";
  const teamCap = drawAllstarMode ? "all teams — no All-Star filter applies" : "avg draw vs baseline";
  tcard.innerHTML = '<h3>Visiting teams <span class="cap">(' + teamCap + ")</span></h3>";
  const tm = document.createElement("div");
  tcard.appendChild(tm); grid.appendChild(tcard);
  if (teams.length) {
    sortableTable(tm, [
      { key: "team", label: "Team", align: "left", defaultDir: "asc", get: r => r.team, cell: r => esc(r.team) },
      { key: "games", label: "G", defaultDir: "desc", get: r => r.games, cell: r => fmtInt(r.games) },
      { key: "mean_delta", label: "Avg Draw", defaultDir: "desc", get: r => r.mean_delta,
        cell: r => '<span class="delta ' + deltaCls(r.mean_delta) + '">' + signed(r.mean_delta) + "</span>" },
    ], teams.slice(), { key: "mean_delta", dir: "desc" });
  } else { tm.innerHTML = '<div class="empty">No visiting-team draw on record.</div>'; }
}

boot();
</script>
</body>
</html>
